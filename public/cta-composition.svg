<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect x="0" y="0" width="600" height="400" fill="none" />
  <!-- Laptop -->
  <rect x="150" y="180" rx="8" ry="8" width="300" height="140" fill="#ffffff" opacity="0.95" stroke="#d8eaf8"/>
  <rect x="175" y="200" width="250" height="90" fill="#f5f9fc" />
  <!-- Smartphone (overlapping) -->
  <rect x="340" y="60" rx="18" ry="18" width="100" height="200" fill="#ffffff" opacity="0.95" stroke="#d8eaf8"/>
  <rect x="352" y="80" width="76" height="160" fill="#fefefe" />
  <!-- Earbuds -->
  <circle cx="220" cy="110" r="18" fill="#ffffff" stroke="#d8eaf8"/>
  <circle cx="250" cy="110" r="18" fill="#ffffff" stroke="#d8eaf8"/>
  <!-- Smart watch -->
  <rect x="120" y="100" rx="10" ry="10" width="54" height="54" fill="#ffffff" stroke="#d8eaf8"/>
  <!-- Shadows -->
  <ellipse cx="300" cy="340" rx="160" ry="18" fill="#000" opacity="0.04" />
</svg>
